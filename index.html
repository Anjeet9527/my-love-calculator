<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Love Calculator 💖</title>
    <style>
        body { font-family: sans-serif; text-align: center; background: #ffe4e1; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 4px 10px rgba(0,0,0,0.1); width: 90%; max-width: 300px; }
        input { width: 90%; padding: 10px; margin: 10px 0; border: 1px solid #ddd; border-radius: 5px; }
        button { background: #ff4d6d; color: white; padding: 10px 20px; border: none; border-radius: 5px; cursor: pointer; }
        #res { margin-top: 20px; font-weight: bold; color: #d63384; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Love Calculator 💖</h1>
        <input type="text" id="n1" placeholder="आपका नाम">
        <input type="text" id="n2" placeholder="साथी का नाम">
        <br><br>
        <button onclick="calc()">Calculate Love 💖</button>
        <h2 id="res"></h2>
    </div>
    <script>
        function calc() {
            let n1 = document.getElementById('n1').value;
            let n2 = document.getElementById('n2').value;
            if(!n1 || !n2) { alert("दोनों नाम लिखें!"); return; }
            let p = Math.floor(Math.random() * 101);
            document.getElementById('res').innerText = "आपका प्यार: " + p + "%";
        }
    </script>
</body>
</html>
