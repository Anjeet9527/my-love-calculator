<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <title>Perfect Love Calculator 💖</title>
    <style>
        body { font-family: 'Segoe UI', sans-serif; text-align: center; background: #fce4ec; padding: 20px; }
        .box { background: white; padding: 30px; border-radius: 20px; display: inline-block; box-shadow: 0 4px 15px rgba(0,0,0,0.15); width: 90%; max-width: 400px; }
        input { width: 90%; padding: 12px; margin: 10px 0; border: 2px solid #ec407a; border-radius: 8px; }
        button { background: #d81b60; color: white; padding: 12px 25px; border: none; border-radius: 8px; cursor: pointer; font-size: 16px; font-weight: bold; }
        #res { margin-top: 25px; font-size: 22px; color: #880e4f; }
        #shayari { margin-top: 15px; font-size: 16px; color: #4a148c; font-style: italic; line-height: 1.6; padding: 10px; }
    </style>
</head>
<body>
    <div class="box">
        <h1>Love Calculator 💖</h1>
        <input type="text" id="n1" placeholder="आपका नाम">
        <input type="text" id="n2" placeholder="साथी का नाम">
        <button onclick="calc()">Calculate Love ✨</button>
        <h2 id="res"></h2>
        <div id="shayari"></div>
    </div>
    <script>
        const shayaris = {
            low: ["अभी प्यार की शुरुआत है, थोड़ा वक्त और साथ है।", "मंजिलें उन्हीं को मिलती हैं जिनके सपनों में जान होती है।", "प्यार एक खूबसूरत एहसास है, इसे वक्त दें।"],
            mid: ["दिल की किताब में गुलाब उनका था, रात की नींद में ख्वाब उनका था।", "इश्क वो नहीं जो तुझे मेरा कर दे, इश्क वो है जो तुझे किसी और का होने न दे।", "तुम मिले तो लगा जैसे खुद से मिल गए।"],
            high: ["हजारों महफिलें हैं और लाखों मेले हैं, लेकिन जहाँ तुम नहीं वहाँ हम अकेले हैं।", "तुम्हारी मुस्कान से शुरू होती है मेरी सुबह, तुम ही हो मेरे प्यार की वजह।", "रब ने बनाई है ये जोड़ी सबसे अनमोल।", "साथ तुम्हारा ऐसा जैसे चाँद के साथ सितारा।"]
        };

        function calc() {
            let n1 = document.getElementById('n1').value.trim().toLowerCase();
            let n2 = document.getElementById('n2').value.trim().toLowerCase();
            if(!n1 || !n2) { alert("कृपया दोनों नाम भरें!"); return; }

            let sum = 0;
            let combined = (n1 + n2);
            for(let i=0; i<combined.length; i++) sum += combined.charCodeAt(i);
            let p = (sum % 100) + 1;

            let category = p < 40 ? "low" : (p < 75 ? "mid" : "high");
            let list = shayaris[category];
            let randomShayari = list[Math.floor(Math.random() * list.length)];

            document.getElementById('res').innerText = "आपका प्यार: " + p + "%";
            document.getElementById('shayari').innerText = randomShayari;
        }
    </script>
</body>
</html>
